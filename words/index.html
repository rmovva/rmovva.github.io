<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sense Dictionary</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f1e8;
      --paper: #fffdf8;
      --ink: #1b1814;
      --muted: #867b6c;
      --line: #ded3c3;
      --accent: #8d5a32;
      --accent-soft: #efe1d0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(141, 90, 50, 0.12), transparent 30%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 17px;
      padding: 36px 20px 80px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 18px;
    }

    .eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 1.35rem;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .search {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.95);
      box-shadow: 0 10px 24px rgba(77, 58, 39, 0.07);
      padding: 18px 20px;
    }

    .search-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    #queryChips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .query-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--accent-soft);
      color: var(--ink);
      padding: 8px 10px 8px 12px;
      font-size: 0.9rem;
      line-height: 1;
    }

    .chip-remove {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
    }

    .search input {
      flex: 1 1 180px;
      min-width: 140px;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 1.02rem;
      color: var(--ink);
    }

    .status {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    .trail {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      min-height: 32px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      scrollbar-width: thin;
      padding-bottom: 2px;
    }

    .trail:empty {
      margin-bottom: 0;
      min-height: 0;
    }

    .trail-step {
      flex: 0 0 auto;
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.8);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 11px;
      font: inherit;
      font-size: 0.84rem;
      line-height: 1;
      cursor: pointer;
    }

    .trail-step.active {
      border-color: rgba(141, 90, 50, 0.55);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .trail-arrow {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1;
    }

    .panel {
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 18px 34px rgba(77, 58, 39, 0.08);
    }

    .section-note {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.88rem;
      margin-bottom: 14px;
      max-width: 68ch;
    }

    .sense-grid, .neighbor-grid, .suggestion-grid {
      display: grid;
      gap: 14px;
    }

    .sense-grid { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .neighbor-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .suggestion-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      padding: 14px 14px 12px;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .card.clickable { cursor: pointer; }

    .card.clickable:hover {
      transform: translateY(-2px);
      border-color: rgba(141, 90, 50, 0.55);
      box-shadow: 0 14px 24px rgba(77, 58, 39, 0.08);
    }

    .card.selected {
      border-color: rgba(141, 90, 50, 0.75);
      background: linear-gradient(180deg, #fffaf2 0%, var(--paper) 100%);
      box-shadow: 0 16px 24px rgba(141, 90, 50, 0.12);
    }

    .word-group {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .group-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .group-word {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
    }

    .wordline {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }

    .wordline .word {
      font-family: 'EB Garamond', serif;
      font-size: 1.3rem;
      line-height: 1;
    }

    .wordline .pos, .score {
      color: var(--accent);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .definition {
      line-height: 1.58;
      font-size: 0.88rem;
    }

    .example {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .neighbor-source {
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .neighbor-source .wordline {
      margin-bottom: 4px;
    }

    .neighbor-source .word {
      font-size: 1.2rem;
    }

    .bubble-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .seed-examples {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .seed-example {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .seed-example strong {
      color: var(--ink);
      font-weight: 600;
    }

    .seed-citation {
      margin-top: 4px;
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .source-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .source-bubble {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--accent-soft);
      color: var(--accent);
      padding: 7px 11px;
      font-size: 0.84rem;
      line-height: 1;
    }

    .bubble {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-size: 0.95rem;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease, color 0.12s ease;
    }

    .bubble:hover {
      transform: translateY(-1px);
      border-color: rgba(141, 90, 50, 0.55);
      box-shadow: 0 10px 18px rgba(77, 58, 39, 0.08);
      color: var(--accent);
    }

    .tooltip {
      position: fixed;
      z-index: 1000;
      max-width: 340px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(27, 24, 20, 0.08);
      background: rgba(27, 24, 20, 0.94);
      color: #fffdf8;
      font-size: 0.82rem;
      line-height: 1.45;
      box-shadow: 0 12px 30px rgba(27, 24, 20, 0.18);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--paper);
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--ink);
    }

    .pill:hover {
      border-color: rgba(141, 90, 50, 0.55);
      color: var(--accent);
    }

    .empty {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.92rem;
      padding: 18px 0 8px;
    }

    .stack {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 20px;
    }

    @media (max-width: 720px) {
      body { padding: 24px 14px 56px; }
      .toolbar { grid-template-columns: 1fr; }
      .status { text-align: left; }
      .panel { padding: 18px; }
      .stack { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="eyebrow">Type a word and press Enter to add it.</div>
    </header>

    <div class="toolbar">
      <label class="search">
        <div class="search-inner">
          <div id="queryChips"></div>
          <input id="searchInput" type="text" autocomplete="off" spellcheck="false" placeholder="geode" />
        </div>
      </label>
      <div class="status" id="statusText">loading index...</div>
    </div>

    <div id="trailBar" class="trail"></div>

    <div class="stack">
      <div class="sidebar">
        <section class="panel" id="lookupPanel">
          <div id="lookupBody" class="empty">Start with a word.</div>
        </section>
      </div>

      <section class="panel" id="neighborsPanel">
        <div id="neighborsBody" class="empty">Pick a sense to explore its neighborhood.</div>
      </section>
    </div>
  </div>

  <div id="hoverTooltip" class="tooltip" hidden></div>

  <script src="./app.js"></script>
</body>
</html>
